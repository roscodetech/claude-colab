[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "__pycache__"]

[tool.ruff.lint]
# E: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear, SIM: simplify
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501",  # line length — 100 char target but don't be religious
  "B008",  # function calls in default args (FastAPI/Click pattern, harmless here)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts in tests are fine

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
